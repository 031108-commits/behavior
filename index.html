<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>建构游戏行为记录器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>建构游戏行为记录器</h1>
  </header>
  
  <div class="container">
    <div class="date-selector">
      <input type="date" id="datePicker" value="">
      <button id="confirmDate">确定</button>
    </div>
    
    <div id="historyModeTip" style="display: none; background-color: #fff3cd; border: 1px solid #ffecb5; color: #856404; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
      <span>📅 当前正在补录 <span id="historyDateText">2026年04月20日</span> 的记录</span>
      <button id="backToTodayBtn" style="background-color: #ffc107; border: 1px solid #ffb300; color: #856404; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">回到今天</button>
    </div>
    
    <div class="summary">
      <div class="summary-item">
        <span>今日记录：</span>
        <span id="recordCount">0</span>
      </div>
      <div class="summary-item">
        <span>今日总分：</span>
        <span id="totalScore">0</span>
      </div>
    </div>
    
    <h2>选择幼儿</h2>
    <div class="students-scroll" id="studentsContainer">
      <!-- 幼儿列表将通过 JavaScript 动态生成 -->
    </div>
    
    <h2>行为记录</h2>
    <div id="behaviorContainer">
      <!-- 行为按钮将通过 JavaScript 动态生成 -->
    </div>
    
    <h2>今日记录</h2>
    <div class="records-list" id="recordsList">
      <!-- 记录列表将通过 JavaScript 动态生成 -->
    </div>
  </div>
  
  <footer>
    <a href="index.html" class="footer-btn active">
      <span class="footer-icon">📝</span>
      <span>记录</span>
    </a>
    <a href="history.html" class="footer-btn">
      <span class="footer-icon">📊</span>
      <span>统计</span>
    </a>
    <a href="class.html" class="footer-btn">
      <span class="footer-icon">👥</span>
      <span>班级</span>
    </a>
    <a href="ai.html" class="footer-btn">
      <span class="footer-icon">🤖</span>
      <span>AI分析</span>
    </a>
  </footer>
  
  <script src="js/app.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
