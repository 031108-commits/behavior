<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <title>教师评价（CLASS量表）</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <h1 class="page-title">教师评价（CLASS量表）</h1>
    
    <!-- 顶部区域：日期选择 + 教师切换 -->
    <div class="header-section">
      <div class="date-picker">
        <label>日期：</label>
        <input type="date" id="datePicker" value="">
      </div>
      <div class="teacher-tabs">
        <button class="tab-btn active" data-teacher="A">教师A</button>
        <button class="tab-btn" data-teacher="B">教师B</button>
      </div>
    </div>
    
    <!-- 评价指标区 -->
    <div class="indicators-section" id="indicatorsSection">
      <!-- 动态生成 -->
    </div>
    
    <!-- 记录列表 -->
    <div class="records-section">
      <div class="records-title">评价记录</div>
      <div class="records-list" id="recordsList">
        <div class="no-records">暂无记录</div>
      </div>
    </div>
  </div>
  
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="teacher">
      <span class="icon">📝</span>
      <span>教师评价</span>
    </button>
    <button class="nav-item" data-page="child">
      <span class="icon">👶</span>
      <span>幼儿评价</span>
    </button>
    <button class="nav-item" data-page="history">
      <span class="icon">📊</span>
      <span>统计</span>
    </button>
    <button class="nav-item" data-page="class">
      <span class="icon">👥</span>
      <span>班级管理</span>
    </button>
    <button class="nav-item" data-page="ai">
      <span class="icon">🤖</span>
      <span>AI分析</span>
    </button>
  </nav>
  
  <script src="js/shared.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
