<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <title>班级管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <!-- SheetJS for xlsx/csv parsing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="page">
    <h1 class="page-title">班级管理</h1>
    
    <!-- 幼儿列表 -->
    <div class="student-section">
      <div class="section-title">幼儿名单</div>
      <div class="student-list" id="studentList">
        <!-- 动态生成 -->
      </div>
    </div>
    
    <!-- 批量导入按钮 -->
    <div class="import-section">
      <button class="import-btn" id="importBtn">
        <span>📂</span> 批量导入
      </button>
      <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none">
    </div>
    
    <!-- 无幼儿提示 -->
    <div class="no-student-tip hidden" id="noStudentTip">
      <span>暂无幼儿，请添加或导入</span>
    </div>
  </div>
  
  <!-- 固定底部添加按钮 -->
  <div class="fixed-bottom-add">
    <button class="add-student-btn" id="addStudentBtn">
      <span>+</span> 添加幼儿
    </button>
  </div>
  
  <!-- 添加幼儿弹窗 -->
  <div class="modal hidden" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>添加幼儿</span>
        <button class="modal-close" id="closeAddModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>姓名：</label>
          <input type="text" id="studentName" placeholder="请输入幼儿姓名" maxlength="10">
        </div>
        <div class="form-group">
          <label>性别：</label>
          <div class="gender-select">
            <button class="gender-btn active" data-gender="boy">
              <span>👦</span> 男孩
            </button>
            <button class="gender-btn" data-gender="girl">
              <span>👧</span> 女孩
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="cancelAdd">取消</button>
        <button class="btn-confirm" id="confirmAdd">确定</button>
      </div>
    </div>
  </div>
  
  <!-- 删除确认弹窗 -->
  <div class="modal hidden" id="deleteModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>确认删除</span>
        <button class="modal-close" id="closeDeleteModal">×</button>
      </div>
      <div class="modal-body">
        <p>确定要删除 <strong id="deleteStudentName"></strong> 吗？</p>
        <p class="warning-text">删除后该幼儿的历史评价记录仍会保留。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="cancelDelete">取消</button>
        <button class="btn-danger" id="confirmDelete">删除</button>
      </div>
    </div>
  </div>
  
  <!-- 导入确认弹窗 -->
  <div class="modal hidden" id="importModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>导入确认</span>
        <button class="modal-close" id="closeImportModal">×</button>
      </div>
      <div class="modal-body">
        <p>共解析到 <strong id="importCount">0</strong> 名幼儿</p>
        <div class="import-preview" id="importPreview"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="cancelImport">取消</button>
        <button class="btn-secondary" id="appendImport">追加</button>
        <button class="btn-confirm" id="overwriteImport">覆盖</button>
      </div>
    </div>
  </div>
  
  <!-- 幼儿详情弹窗 -->
  <div class="modal hidden" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>幼儿详情</span>
        <button class="modal-close" id="closeDetailModal">×</button>
      </div>
      <div class="modal-body" id="detailBody">
      </div>
      <div class="modal-footer">
        <button class="btn-confirm" id="closeDetailBtn">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item" data-page="teacher">
      <span class="icon">📝</span>
      <span>教师评价</span>
    </button>
    <button class="nav-item" data-page="child">
      <span class="icon">👶</span>
      <span>幼儿评价</span>
    </button>
    <button class="nav-item" data-page="history">
      <span class="icon">📊</span>
      <span>统计</span>
    </button>
    <button class="nav-item active" data-page="class">
      <span class="icon">👥</span>
      <span>班级管理</span>
    </button>
    <button class="nav-item" data-page="ai">
      <span class="icon">🤖</span>
      <span>AI分析</span>
    </button>
  </nav>
  
  <script src="js/shared.js"></script>
  <script src="js/class.js"></script>
</body>
</html>
