<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <title>统计</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="page">
    <h1 class="page-title">统计</h1>
    
    <!-- 筛选区域 -->
    <div class="filter-section">
      <!-- 评价类型切换 -->
      <div class="filter-tabs" id="typeTabs">
        <button class="tab-btn active" data-type="teacher">教师评价</button>
        <button class="tab-btn" data-type="child">幼儿评价</button>
      </div>
      
      <!-- 日期范围 -->
      <div class="date-range">
        <div class="date-item">
          <label>开始日期：</label>
          <input type="date" id="startDate">
        </div>
        <div class="date-item">
          <label>结束日期：</label>
          <input type="date" id="endDate">
        </div>
      </div>
      
      <!-- 教师选择（仅教师评价时显示） -->
      <div class="teacher-selector hidden" id="teacherSelector">
        <div class="selector-label">选择教师：</div>
        <div class="selector-btns">
          <button class="selector-btn active" data-teacher="A">教师A</button>
          <button class="selector-btn" data-teacher="B">教师B</button>
        </div>
      </div>
      
      <!-- 幼儿选择（仅幼儿评价时显示） -->
      <div class="child-selector hidden" id="childSelector">
        <div class="selector-label">选择幼儿：</div>
        <div class="student-scroll" id="studentScroll">
          <button class="student-item active" data-id="all">全部</button>
        </div>
      </div>
      
      <!-- 查询按钮 -->
      <button class="query-btn" id="queryBtn">查询</button>
    </div>
    
    <!-- 统计表格 -->
    <div class="table-section">
      <div class="table-header">
        <span>评价统计表</span>
        <div class="table-actions">
          <button class="export-btn" id="exportBtn">导出CSV</button>
          <button class="heatmap-btn" id="heatmapBtn">📊 生成热力图</button>
        </div>
      </div>
      <div class="table-scroll">
        <table class="stats-table" id="statsTable">
          <thead id="tableHead">
            <tr><th>加载中...</th></tr>
          </thead>
          <tbody id="tableBody">
            <tr><td>请选择条件后点击查询</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- 热力图容器 -->
    <div class="heatmap-wrapper" id="heatmapWrapper" style="display:none;">
      <div class="heatmap-header">
        <span id="heatmapTitle">热力图</span>
      </div>
      <div id="heatmapContainer" style="width:100%;height:350px;"></div>
    </div>
    
    <!-- 无数据提示 -->
    <div class="no-data-tip hidden" id="noDataTip">
      <span>暂无数据</span>
    </div>
  </div>
  
  <!-- 幼儿详情弹窗 -->
  <div class="modal hidden" id="childDetailModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>幼儿详情</span>
        <button class="modal-close" id="closeChildDetail">×</button>
      </div>
      <div class="modal-body" id="childDetailBody">
      </div>
      <div class="modal-footer">
        <button class="btn-confirm" id="closeChildDetailBtn">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item" data-page="teacher">
      <span class="icon">📝</span>
      <span>教师评价</span>
    </button>
    <button class="nav-item" data-page="child">
      <span class="icon">👶</span>
      <span>幼儿评价</span>
    </button>
    <button class="nav-item active" data-page="history">
      <span class="icon">📊</span>
      <span>统计</span>
    </button>
    <button class="nav-item" data-page="class">
      <span class="icon">👥</span>
      <span>班级管理</span>
    </button>
    <button class="nav-item" data-page="ai">
      <span class="icon">🤖</span>
      <span>AI分析</span>
    </button>
  </nav>
  
  <script src="js/shared.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
