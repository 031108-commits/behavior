<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>历史统计 - 建构游戏行为记录器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header>
    <h1>历史统计</h1>
  </header>
  
  <div class="container">
    <div class="filter-section">
      <div class="filter-row">
        <label for="startDate">开始日期</label>
        <input type="date" id="startDate" value="">
      </div>
      <div class="filter-row">
        <label for="endDate">结束日期</label>
        <input type="date" id="endDate" value="">
      </div>
      <div class="filter-row">
        <button id="searchBtn">查询</button>
      </div>
    </div>
    
    <h2>幼儿筛选</h2>
    <div class="students-scroll" id="studentsFilter">
      <div class="student-item active" data-id="0">
        <div>全班幼儿</div>
        <div class="student-gender">👥</div>
      </div>
      <!-- 幼儿列表将通过 JavaScript 动态生成 -->
    </div>
    
    <div class="table-container" id="statsTableContainer">
      <table class="stats-table" id="statsTable">
        <thead>
          <tr id="tableHeader">
            <th>维度</th>
            <!-- 日期列将通过 JavaScript 动态生成 -->
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- 表格内容将通过 JavaScript 动态生成 -->
        </tbody>
      </table>
    </div>
    
    <button class="export-btn" id="heatmapBtn" style="margin: 20px 0;">📊 生成热力图</button>
    
    <div id="heatmapContainer" style="width: 100%; height: 350px; margin: 20px 0; display: none;"></div>
    
    <button class="export-btn" id="exportBtn">📊 导出为Excel</button>
  </div>
  
  <footer>
    <a href="index.html" class="footer-btn">
      <span class="footer-icon">📝</span>
      <span>记录</span>
    </a>
    <a href="history.html" class="footer-btn active">
      <span class="footer-icon">📊</span>
      <span>统计</span>
    </a>
    <a href="class.html" class="footer-btn">
      <span class="footer-icon">👥</span>
      <span>班级</span>
    </a>
    <a href="ai.html" class="footer-btn">
      <span class="footer-icon">🤖</span>
      <span>AI分析</span>
    </a>
  </footer>
  
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
