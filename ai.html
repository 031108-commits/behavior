<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AI 分析 - 建构游戏行为记录器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">
</head>
<body>
  <div class="container">
    <h1>AI 视频分析</h1>
    
    <!-- 幼儿选择器 + 日期选择器 -->
    <div class="child-selector-section">
      <div class="child-scroll" id="childScroll">
        <!-- 幼儿头像将通过 JS 动态生成 -->
      </div>
      <div class="date-picker-row">
        <input type="date" id="observationDate">
      </div>
    </div>
    
    <!-- 视频上传区 -->
    <div class="video-upload-section" id="videoUploadSection">
      <div class="video-upload-area" id="videoUploadArea">
        <div class="upload-icon">🎬</div>
        <p class="upload-text">点击或拖拽上传视频</p>
        <p class="upload-hint">支持 MP4、MOV、AVI 格式</p>
        <input type="file" id="videoInput" accept="video/*" hidden>
      </div>
      <div class="video-preview" id="videoPreview" style="display: none;">
        <video id="previewVideo" controls></video>
        <button class="remove-video-btn" id="removeVideoBtn">×</button>
      </div>
    </div>
    
    <!-- 分析参数区 -->
    <div class="params-section">
      <div class="param-card">
        <label class="param-label">游戏类型</label>
        <select id="gameTypeSelect" class="param-select">
          <option value="建构游戏">建构游戏</option>
          <option value="角色游戏">角色游戏</option>
          <option value="其他">其他</option>
        </select>
      </div>
      
      <div class="param-card toggle-card">
        <div class="toggle-header" id="toggleApiToken">
          <span class="toggle-icon">🔑</span>
          <span>设置 API Token</span>
          <span class="toggle-arrow">▼</span>
        </div>
        <div class="toggle-content" id="apiTokenContent" style="display: none;">
          <input type="password" id="apiToken" placeholder="输入 API Token" class="param-input">
        </div>
      </div>
      
      <div class="param-card toggle-card">
        <div class="toggle-header" id="toggleWorkflowId">
          <span class="toggle-icon">⚙️</span>
          <span>设置工作流 ID</span>
          <span class="toggle-arrow">▼</span>
        </div>
        <div class="toggle-content" id="workflowIdContent" style="display: none;">
          <input type="text" id="workflowId" placeholder="输入工作流 ID" class="param-input">
          <p class="param-hint">工作流 ID 可在扣子平台获取</p>
        </div>
      </div>
    </div>
    
    <!-- 开始分析按钮 -->
    <button class="analyze-btn" id="startAnalyzeBtn">
      <span class="btn-icon">🚀</span>
      <span>开始分析</span>
    </button>
    
    <!-- 进度显示区 -->
    <div class="progress-section" id="progressSection" style="display: none;">
      <div class="progress-content">
        <div class="spinner"></div>
        <p class="progress-text" id="progressText">正在上传视频...</p>
        <p class="progress-detail" id="progressDetail"></p>
      </div>
    </div>
    
    <!-- 结果展示区 -->
    <div class="result-section" id="resultSection" style="display: none;">
      <div class="result-tabs">
        <button class="tab-btn active" data-tab="checklist">📊 检核表</button>
        <button class="tab-btn" data-tab="report">📝 分析报告</button>
        <button class="tab-btn" data-tab="suggestions">💬 谈话建议</button>
      </div>
      
      <div class="tab-content" id="tabChecklist">
        <div class="table-wrapper">
          <table class="result-table" id="checklistTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      
      <div class="tab-content" id="tabReport" style="display: none;">
        <div class="report-content" id="reportContent"></div>
      </div>
      
      <div class="tab-content" id="tabSuggestions" style="display: none;">
        <div class="suggestions-content" id="suggestionsContent"></div>
      </div>
    </div>
  </div>
  
  <footer>
    <a href="index.html" class="footer-btn">
      <span class="footer-icon">📝</span>
      <span>记录</span>
    </a>
    <a href="history.html" class="footer-btn">
      <span class="footer-icon">📊</span>
      <span>统计</span>
    </a>
    <a href="class.html" class="footer-btn">
      <span class="footer-icon">👥</span>
      <span>班级</span>
    </a>
    <a href="ai.html" class="footer-btn active">
      <span class="footer-icon">🤖</span>
      <span>AI分析</span>
    </a>
  </footer>
  
  <script src="js/app.js"></script>
  <script src="js/ai.js"></script>
</body>
</html>
