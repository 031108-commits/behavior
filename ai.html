<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <title>AI分析</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <h1 class="page-title">AI分析</h1>
    
    <!-- 评价类型切换 -->
    <div class="type-tabs" id="typeTabs">
      <button class="tab-btn active" data-type="teacher">教师评价分析</button>
      <button class="tab-btn" data-type="child">幼儿评价分析</button>
    </div>
    
    <!-- API Key输入 -->
    <div class="api-section">
      <input type="password" id="apiKeyInput" placeholder="请输入您的 DeepSeek API Key" autocomplete="off">
      <p class="security-tip">API Key仅用于本次分析，关闭页面后不会保存</p>
    </div>
    
    <!-- 录音按钮区域 -->
    <div class="voice-section" id="voiceSection">
      <button class="record-btn" id="recordBtn" title="点击开始录音">
        <span class="mic-icon">🎤</span>
      </button>
      <span class="voice-status" id="voiceStatus"></span>
    </div>
    
    <!-- 分析内容输入 -->
    <div class="input-section">
      <textarea id="contentInput" placeholder="请粘贴观察记录文本..."></textarea>
    </div>
    
    <!-- 开始分析按钮 -->
    <button class="analyze-btn" id="analyzeBtn">
      开始分析
    </button>
    
    <!-- 加载状态 -->
    <div class="loading-section hidden" id="loadingSection">
      <div class="loading-spinner"></div>
      <span>AI正在分析中...</span>
    </div>
    
    <!-- 分析结果 -->
    <div class="result-section hidden" id="resultArea">
      <div class="result-header">
        <span>分析结果</span>
      </div>
      <div class="result-content" id="resultContent">
      </div>
    </div>
    
    <!-- 错误提示 -->
    <div class="error-section hidden" id="errorSection">
      <div class="error-icon">⚠️</div>
      <div class="error-message" id="errorMessage"></div>
    </div>
  </div>
  
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item" data-page="teacher">
      <span class="icon">📝</span>
      <span>教师评价</span>
    </button>
    <button class="nav-item" data-page="child">
      <span class="icon">👶</span>
      <span>幼儿评价</span>
    </button>
    <button class="nav-item" data-page="history">
      <span class="icon">📊</span>
      <span>统计</span>
    </button>
    <button class="nav-item" data-page="class">
      <span class="icon">👥</span>
      <span>班级管理</span>
    </button>
    <button class="nav-item active" data-page="ai">
      <span class="icon">🤖</span>
      <span>AI分析</span>
    </button>
  </nav>
  
  <script src="js/shared.js"></script>
  <script src="js/ai.js"></script>
</body>
</html>
