<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>幼儿详情 - 建构游戏行为记录器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>幼儿详情</h1>
  </header>
  
  <div class="container">
    <div class="student-detail-header">
      <div class="student-detail-name" id="studentName">加载中...</div>
      <div class="student-detail-gender" id="studentGender">👦</div>
    </div>
    
    <div class="filter-section">
      <div class="filter-row">
        <label for="startDate">开始日期</label>
        <input type="date" id="startDate" value="">
      </div>
      <div class="filter-row">
        <label for="endDate">结束日期</label>
        <input type="date" id="endDate" value="">
      </div>
      <div class="filter-row">
        <button id="searchBtn">查询</button>
      </div>
    </div>
    
    <div class="table-container">
      <table class="detail-table" id="detailTable">
        <thead>
          <tr>
            <th>维度</th>
            <th>总分</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- 表格内容将通过 JavaScript 动态生成 -->
        </tbody>
      </table>
    </div>
    
    <div id="subDetailContainer">
      <!-- 子维度详情将通过 JavaScript 动态生成 -->
    </div>
  </div>
  
  <footer>
    <a href="index.html" class="footer-btn">
      <span class="footer-icon">📝</span>
      <span>记录</span>
    </a>
    <a href="history.html" class="footer-btn">
      <span class="footer-icon">📊</span>
      <span>统计</span>
    </a>
    <a href="class.html" class="footer-btn">
      <span class="footer-icon">👥</span>
      <span>班级</span>
    </a>
    <a href="ai.html" class="footer-btn">
      <span class="footer-icon">🤖</span>
      <span>AI分析</span>
    </a>
  </footer>
  
  <script src="js/app.js"></script>
  <script src="js/student-detail.js"></script>
</body>
</html>
